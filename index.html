<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Position practice</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>My Website</h1>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>

  <main>
    <section class="content">
      <h2>Main Content</h2>

      <div class="box red">red</div>
      <div class="box blue">blue</div>
      <div class="box green">green</div>
      <div class="box black">black</div>

    </section>

    <aside class="sidebar">
      <h3>Sidebar</h3>
      <div class="box yellow">yellow</div>
    </aside>
  </main>
  <!-- part-05 -->
  <section class="parent-container">
    <h3>parent box</h3>
    <div class="box child-box">Child box</div>

  </section>
  <div class="container">
    <div class="boxer z-1">z-index: 1</div>
    <div class="boxer z-2">z-index: 2</div>
    <div class="boxer z-3">z-index: 3</div>
  </div>

  <footer>
    <p>© 2026 My Website,made by sabbir</p>
  </footer>

</body>

</html>
